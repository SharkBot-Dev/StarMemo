<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - {{title}}</title>
    <link rel="stylesheet" href="static/sky.css">
    <style>
        body { width: 100%; height: 100vh; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
        .admin-container { max-width: 800px; width: 100%; background: rgba(15, 15, 35, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 40px; color: white; box-shadow: 0 0 40px rgba(0, 0, 0, 0.6); z-index: 1000; position: relative; }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-align: center; }
        #sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; color: rgba(255,255,255,0.6); }
        .tab-btn.active { color: white; border-bottom: 2px solid #4facfe; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-container input { width: 100%; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 12px; color: white; margin-top: 8px; box-sizing: border-box; }
        .admin-container button { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border: none; border-radius: 12px; padding: 10px 20px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .user-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; }
        .pagination { margin-top: 20px; text-align: center; }
        .back-link { display: inline-block; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="sky"></div>
    <div class="admin-container">
        <h1>管理画面</h1>
        <div class="tabs">
            <div class="tab-btn active" onclick="openTab('userTab')">ユーザー管理</div>
            <div class="tab-btn" onclick="openTab('roleTab')">ロール管理</div>
        </div>
        <div id="userTab" class="tab-content active">
            <h2>ユーザー一覧</h2>
            <div id="userList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
        <div id="roleTab" class="tab-content">
            <h2>ロール一覧</h2>
            <div id="roleList"></div>
            <h2>ロール作成</h2>
            <input type="text" id="newRoleName" placeholder="ロール名">
            <input type="text" id="newRolePermissions" placeholder="権限ID (カンマ区切り)">
            <input type="text" id="newRoleDescription" placeholder="説明">
            <button onclick="createRole()">作成</button>
        </div>
        <a href="/" class="back-link">← ホームに戻る</a>
    </div>
    <script>
        let currentPage = 1;
        const usersPerPage = 10;

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function loadData() {
            loadUsers();

            const rolesRes = await fetch('/api/roles');
            const rolesData = await rolesRes.json();
            const roleList = document.getElementById('roleList');
            roleList.innerHTML = Object.entries(rolesData.roles).map(([name, data]) => `
                <div class="user-item"><strong>${name}</strong>: ${data.description} (権限: ${data.permissions.join(', ')})</div>
            `).join('');
        }

        async function loadUsers() {
            const res = await fetch(`/api/users?page=${currentPage}&limit=${usersPerPage}`);
            const data = await res.json();
            
            const userList = document.getElementById('userList');
            userList.innerHTML = data.users.map(u => `
                <div class="user-item">
                    <strong>${u.username}</strong> (ロール: ${u.roles.join(', ')})<br>
                    <input type="text" id="addRole-${u.username}" placeholder="追加ロール名" style="width: 40%;">
                    <button onclick="addRole('${u.username}')">付与</button><br>
                    <input type="text" id="removeRole-${u.username}" placeholder="削除ロール名" style="width: 40%;">
                    <button onclick="removeRole('${u.username}')">削除</button>
                </div>
            `).join('');

            const totalPages = Math.ceil(data.total_users / usersPerPage);
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = Array.from({length: totalPages}, (_, i) => i + 1).map(page => 
                `<button onclick="changePage(${page})" style="margin: 5px; ${page === currentPage ? 'background: #555;' : ''}">${page}</button>`
            ).join('');
        }

        function changePage(page) {
            currentPage = page;
            loadUsers();
        }

        async function createRole() {
            const name = document.getElementById('newRoleName').value;
            const permissions = document.getElementById('newRolePermissions').value.split(',').map(p => parseInt(p.trim())).filter(p => !isNaN(p));
            const description = document.getElementById('newRoleDescription').value;
            await fetch('/api/roles', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, permissions, description }) });
            loadData();
        }

        async function addRole(username) {
            const role = document.getElementById(`addRole-${username}`).value;
            await fetch('/api/roles/user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username, role }) });
            loadData();
        }

        async function removeRole(username) {
            const role = document.getElementById(`removeRole-${username}`).value;
            await fetch('/api/roles/user', { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username, role }) });
            loadData();
        }
        
        loadData();
        const sky = document.getElementById('sky');
        for (let i = 0; i < 150; i++) {
            const bgStar = document.createElement('div');
            bgStar.className = 'bg-star';
            bgStar.style.width = `${Math.random() * 2 + 1}px`;
            bgStar.style.height = bgStar.style.width;
            bgStar.style.left = `${Math.random() * 100}%`;
            bgStar.style.top = `${Math.random() * 100}%`;
            bgStar.style.opacity = Math.random();
            sky.appendChild(bgStar);
        }
    </script>
</body>
</html>
