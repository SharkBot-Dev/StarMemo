<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更 - {{title}}</title>
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://cdn.discordapp.com/avatars/1322100616369147924/ea2f4e3e91a7ed3e096567b34c070600.png?size=1024" />
    <link rel="stylesheet" href="static/sky.css">
    <style>
        body {
            width: 100%;
            height: 100vh;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .legal-container {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            color: white;
            line-height: 1.8;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            position: relative;
        }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #4facfe; border-left: 4px solid #4facfe; padding-left: 15px; }
        p { margin-bottom: 15px; font-size: 0.95rem; color: rgba(255,255,255,0.9); }
        #sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .legal-container input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
            margin-top: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .legal-container button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            font-size: 1rem;
            width: 100%;
        }
        .legal-container button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div id="sky"></div>

    <div class="legal-container">
        <h2>パスワード変更</h2>
        {% if error %}
            <p style="color: #ffaaaa; font-size: 0.8em;">{{ error }}</p>
        {% endif %}
        <form method="post">
            <div>
                現在のパスワード: <input name="current_password" type="password" required>
            </div>
            <div style="margin-top: 15px;">
                新しいパスワード: <input name="new_password" type="password" required>
                <div class="hint">8文字以上で入力してください</div>
            </div>
            <div style="margin-top: 15px;">
                新しいパスワード（確認）: <input name="confirm_password" type="password" required>
            </div>
            <button type="submit">変更する</button>
        </form>
        <a href="/" class="back-link">← ホームに戻る</a>
    </div>

    <script>
        const sky = document.getElementById('sky');
        for (let i = 0; i < 150; i++) {
            const bgStar = document.createElement('div');
            bgStar.className = 'bg-star';
            bgStar.style.width = `${Math.random() * 2 + 1}px`;
            bgStar.style.height = bgStar.style.width;
            bgStar.style.left = `${Math.random() * 100}%`;
            bgStar.style.top = `${Math.random() * 100}%`;
            bgStar.style.opacity = Math.random();
            sky.appendChild(bgStar);
        }
    </script>
</body>
</html>
