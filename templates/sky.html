<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空メモ</title>
    <link rel="stylesheet" href="static/sky.css">
</head>
<body>

    <div id="scroll-wrapper">
        <div id="scroll-content">
            <div id="zoom-container">
                <canvas id="constellationCanvas"></canvas>
                <div id="sky"></div>
            </div>
        </div>
    </div>

    <div id="ui-layer-top">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="メモを検索...">
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="showPublicToggle" checked>
            <label for="showPublicToggle">他人のメモを表示</label>
        </div>
        <div class="zoom-controls">
            <button id="zoomOutBtn" title="縮小">−</button>
            <span id="zoomLevelIndicator">100%</span>
            <button id="zoomInBtn" title="拡大">+</button>
        </div>
    </div>

    <div id="ui-layer">
        <div class="input-container">
            <div class="expiry-note">メモは24時間後に消えます</div>
            <textarea id="memoInput" placeholder="ここに秘密のメモを残す..." rows="1"></textarea>
            <div class="checkbox-container">
                <input type="checkbox" id="isPublicCheckbox">
                <label for="isPublicCheckbox">公開</label>
            </div>
            <button id="addMemoBtn">残す</button>
            <div class="footer-links">
                <a href="/logout">ログアウト</a>
                <div class="sub-links">
                    <a href="/terms">規約</a>
                    <a href="/privacy">方針</a>
                </div>
            </div>
        </div>
    </div>

    <input type="hidden" id="currentUsername" value="{{ username }}">


    <script src="static/script.js"></script>
</body>
</html>
